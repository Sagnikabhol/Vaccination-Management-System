<!DOCTYPE html>
<html>
<head>

    <title>Immunity Plus</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js"></script>

</head>

<body>

<div class="container">

    <h1>Immunity Plus</h1>

    <form action="register"
          method="post"
          onsubmit="return validateForm()">

        <input type="text"
               name="fullname"
               placeholder="Full Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               id="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
